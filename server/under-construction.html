<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construcción - Noworries.gift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F4;
            --primary: #1C1917;
            --secondary: #78716C;
            --accent: #F59E0B;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent);
        }

        .card {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(28, 25, 23, 0.05);
            border: 1px solid rgba(214, 211, 209, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        p {
            font-size: 1.125rem;
            color: var(--secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(245, 158, 11, 0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            margin: 0 auto 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gradient-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.875rem;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="container">
        <div class="logo">noworries<span>.gift</span></div>
        <div class="card">
            <div class="status-badge">Próximamente</div>
            <div class="loader"></div>
            <h1>En construcción</h1>
            <p>Estamos preparando algo increíble para ayudarte a encontrar el regalo perfecto en un solo clic.</p>
        </div>
        <div class="footer">
            &copy; 2026 Noworries.gift. Todos los derechos reservados.
        </div>
    </div>
</body>
</html>
